<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Blowing Fish</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🐟 Bubble Blowing Fish</h1>
        <p class="subtitle">Fish blowing bubbles that rise</p>

        <div class="fish-wrapper">
            <canvas id="fishCanvas"></canvas>

            <div class="controls">
                <button id="blowBtn">🫧 Blow</button>
                <button id="speedBtn">Speed: Normal</button>
                <button id="colorBtn">Color: Rainbow</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🐟 Swimming</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('fishCanvas');
        const ctx = canvas.getContext('2d');
        const blowBtn = document.getElementById('blowBtn');
        const speedBtn = document.getElementById('speedBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let fish = {};
        let bubbles = [];
        let speed = 0.02;
        let speedLevel = 1;
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let particles = [];
        let blowCount = 0;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.005 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Very Fast', value: 0.07 },
        ];

        // ===== COLOR PALETTES =====
        const colorPalettes = [
            {
                name: 'Rainbow',
                body: (t) => {
                    const hue = (t * 360 + time * 20) % 360;
                    return `hsl(${hue}, 80%, 60%)`;
                },
                fin: (t) => {
                    const hue = (t * 360 + time * 20 + 30) % 360;
                    return `hsl(${hue}, 80%, 50%)`;
                },
                bubble: (t) => `hsla(${t * 360 + time * 30}, 80%, 70%, 0.4)`
            },
            {
                name: 'Ocean',
                body: (t) => {
                    const hue = 200 + t * 40 + Math.sin(time * 0.02 + t * 2) * 10;
                    return `hsl(${hue}, 70%, ${50 + t * 30}%)`;
                },
                fin: (t) => {
                    const hue = 200 + t * 40 + Math.sin(time * 0.02 + t * 2 + 0.5) * 10;
                    return `hsl(${hue}, 70%, ${40 + t * 30}%)`;
                },
                bubble: (t) => `hsla(210, 80%, 80%, 0.3)`
            },
            {
                name: 'Tropical',
                body: (t) => {
                    const hue = 20 + t * 30 + Math.sin(time * 0.02 + t * 2) * 10;
                    return `hsl(${hue}, 80%, ${50 + t * 30}%)`;
                },
                fin: (t) => {
                    const hue = 20 + t * 30 + Math.sin(time * 0.02 + t * 2 + 0.5) * 10;
                    return `hsl(${hue}, 80%, ${40 + t * 30}%)`;
                },
                bubble: (t) => `hsla(40, 80%, 80%, 0.3)`
            },
            {
                name: 'Galaxy',
                body: (t) => {
                    const hue = 250 + t * 50 + Math.sin(time * 0.02 + t * 2) * 15;
                    return `hsl(${hue}, 80%, ${40 + t * 30}%)`;
                },
                fin: (t) => {
                    const hue = 250 + t * 50 + Math.sin(time * 0.02 + t * 2 + 0.5) * 15;
                    return `hsl(${hue}, 80%, ${30 + t * 30}%)`;
                },
                bubble: (t) => `hsla(280, 80%, 80%, 0.3)`
            },
            {
                name: 'Neon',
                body: (t) => {
                    const hue = (t * 360 + time * 30) % 360;
                    return `hsl(${hue}, 100%, 55%)`;
                },
                fin: (t) => {
                    const hue = (t * 360 + time * 30 + 30) % 360;
                    return `hsl(${hue}, 100%, 45%)`;
                },
                bubble: (t) => `hsla(${t * 360 + time * 40}, 100%, 70%, 0.4)`
            },
            {
                name: 'Pastel',
                body: (t) => {
                    const hue = (t * 360 + time * 15) % 360;
                    return `hsl(${hue}, 60%, 75%)`;
                },
                fin: (t) => {
                    const hue = (t * 360 + time * 15 + 30) % 360;
                    return `hsl(${hue}, 60%, 65%)`;
                },
                bubble: (t) => `hsla(${t * 360 + time * 20}, 60%, 85%, 0.3)`
            },
        ];

        // ===== PARTICLE CLASS =====
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color || '#ffd93d';
                this.size = 1 + Math.random() * 3;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2 - 0.5;
                this.life = 1;
                this.maxLife = 20 + Math.random() * 30;
                this.age = 0;
                this.gravity = 0.02 + Math.random() * 0.03;
                this.glow = 0.3 + Math.random() * 0.4;
            }

            update() {
                this.age++;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.life = 1 - this.age / this.maxLife;
                this.size *= 0.995;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                grad.addColorStop(0, this.color + '60');
                grad.addColorStop(1, this.color + '00');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.life * 0.3;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.6;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color + '60';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }
        }

        // ===== BUBBLE CLASS =====
        class Bubble {
            constructor(x, y, color) {
                this.x = x + (Math.random() - 0.5) * 10;
                this.y = y + (Math.random() - 0.5) * 5;
                this.radius = 3 + Math.random() * 6;
                this.targetRadius = this.radius * (1.5 + Math.random() * 1.5);
                this.speed = 0.3 + Math.random() * 0.5;
                this.wobble = 0.3 + Math.random() * 0.5;
                this.phase = Math.random() * Math.PI * 2;
                this.alpha = 0.3 + Math.random() * 0.4;
                this.life = 1;
                this.maxLife = 120 + Math.random() * 180;
                this.age = 0;
                this.color = color || `hsla(200, 80%, 70%, 0.3)`;
                this.glow = 0.3 + Math.random() * 0.4;
                this.pulse = 0.5 + Math.random() * 0.5;
            }

            update(speed) {
                this.age += speed * 2;
                this.y -= this.speed * speed * 20;
                this.x += Math.sin(this.phase + this.age * 0.03) * this.wobble * 0.2;
                this.phase += 0.02 * speed * 10;
                this.life = 1 - this.age / this.maxLife;
                this.radius += (this.targetRadius - this.radius) * 0.01;
                this.pulse = 0.5 + 0.5 * Math.sin(this.age * 0.05 + this.phase);
            }

            draw(ctx) {
                if (this.life <= 0) return;

                const r = this.radius * (0.8 + 0.2 * this.pulse);
                const alpha = this.alpha * this.life;

                // Glow
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 3);
                grad.addColorStop(0, this.color + `${Math.floor(alpha * 60)}`);
                grad.addColorStop(1, this.color + '00');
                ctx.beginPath();
                ctx.arc(this.x, this.y, r * 3, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = alpha * 0.3;
                ctx.fill();

                // Bubble outline
                ctx.beginPath();
                ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = alpha * 0.6;
                ctx.lineWidth = 0.5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Bubble fill
                ctx.beginPath();
                ctx.arc(this.x, this.y, r * 0.9, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha * 0.1;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(this.x - r * 0.25, this.y - r * 0.25, r * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.globalAlpha = alpha * 0.6;
                ctx.fill();

                // Secondary highlight
                ctx.beginPath();
                ctx.arc(this.x - r * 0.15, this.y - r * 0.4, r * 0.1, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.globalAlpha = alpha * 0.4;
                ctx.fill();

                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0 || this.y < -20 || this.age > this.maxLife;
            }
        }

        // ===== DRAW FISH =====
        function drawFish(ctx, cx, cy, scale) {
            const s = scale || 1;
            const r = 30 * s;
            const colorFn = colorPalettes[colorMode].body;
            const finFn = colorPalettes[colorMode].fin;
            const color = colorFn(0.5 + Math.sin(time * 0.02) * 0.1);
            const finColor = finFn(0.5 + Math.sin(time * 0.02 + 0.3) * 0.1);
            const swim = Math.sin(time * 2) * 0.1;
            const mouthOpen = 0.7 + 0.3 * Math.sin(time * 3);

            ctx.save();
            ctx.translate(cx, cy);

            // Glow
            const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 2.5);
            grad.addColorStop(0, color + '20');
            grad.addColorStop(1, color + '00');
            ctx.beginPath();
            ctx.arc(0, 0, r * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Tail
            ctx.save();
            ctx.translate(-r * 1.2, 0);
            ctx.rotate(swim * 0.3);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-r * 0.4, -r * 0.6, -r * 0.8, -r * 0.3);
            ctx.quadraticCurveTo(-r * 0.5, 0, -r * 0.8, r * 0.3);
            ctx.quadraticCurveTo(-r * 0.4, r * 0.6, 0, 0);
            ctx.closePath();
            ctx.fillStyle = finColor;
            ctx.shadowBlur = 15;
            ctx.shadowColor = finColor + '40';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();

            // Body
            ctx.beginPath();
            ctx.ellipse(0, 0, r * 1.2, r * 0.7, 0, 0, Math.PI * 2);
            const bodyGrad = ctx.createRadialGradient(
                -r * 0.2, -r * 0.2, 0,
                0, 0, r
            );
            bodyGrad.addColorStop(0, color);
            bodyGrad.addColorStop(0.7, color);
            bodyGrad.addColorStop(1, color + '80');
            ctx.fillStyle = bodyGrad;
            ctx.shadowBlur = 20;
            ctx.shadowColor = color + '60';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Dorsal fin
            ctx.beginPath();
            ctx.moveTo(r * 0.1, -r * 0.5);
            ctx.quadraticCurveTo(r * 0.4, -r * 1.0, r * 0.8, -r * 0.6);
            ctx.closePath();
            ctx.fillStyle = finColor;
            ctx.globalAlpha = 0.7;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Pectoral fin
            ctx.beginPath();
            ctx.moveTo(r * 0.2, r * 0.1);
            ctx.quadraticCurveTo(r * 0.5, r * 0.5, r * 0.1, r * 0.4);
            ctx.closePath();
            ctx.fillStyle = finColor;
            ctx.globalAlpha = 0.6;
            ctx.fill();
            ctx.globalAlpha = 1;

            // Eye
            const eyeX = r * 0.5;
            const eyeY = -r * 0.1;
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, r * 0.18, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.beginPath();
            ctx.arc(eyeX + r * 0.06, eyeY, r * 0.08, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(eyeX + r * 0.09, eyeY - r * 0.03, r * 0.03, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // Mouth
            const mouthX = r * 0.9;
            const mouthY = r * 0.05;
            ctx.beginPath();
            ctx.arc(mouthX, mouthY, r * 0.15, 0.1, Math.PI - 0.1);
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Lip (bottom)
            ctx.beginPath();
            ctx.arc(mouthX, mouthY + r * 0.05, r * 0.08, 0, Math.PI);
            ctx.fillStyle = color + '80';
            ctx.fill();

            // Gill line
            ctx.beginPath();
            ctx.arc(-r * 0.2, 0, r * 0.25, -Math.PI * 0.6, Math.PI * 0.6);
            ctx.strokeStyle = color + '80';
            ctx.lineWidth = 0.5;
            ctx.stroke();

            // Scales (decorative)
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 + 0.3;
                const sx = Math.cos(angle) * r * 0.3;
                const sy = Math.sin(angle) * r * 0.2;
                ctx.beginPath();
                ctx.arc(sx, sy, r * 0.06, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                ctx.fill();
            }

            ctx.restore();
        }

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#0a1a2e');
            grad.addColorStop(0.3, '#0a1a2e');
            grad.addColorStop(0.6, '#061520');
            grad.addColorStop(1, '#030a10');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Light rays
            for (let i = 0; i < 5; i++) {
                const x = (i / 5) * w + Math.sin(time * 0.005 + i) * 30;
                const grad2 = ctx.createLinearGradient(x, 0, x + 20, h);
                grad2.addColorStop(0, 'rgba(100, 200, 255, 0.02)');
                grad2.addColorStop(0.5, 'rgba(100, 200, 255, 0.04)');
                grad2.addColorStop(1, 'rgba(100, 200, 255, 0)');
                ctx.fillStyle = grad2;
                ctx.fillRect(x, 0, 20, h);
            }

            // Sandy bottom
            const groundY = h * 0.85;
            const groundGrad = ctx.createLinearGradient(0, groundY, 0, h);
            groundGrad.addColorStop(0, 'rgba(40, 60, 50, 0)');
            groundGrad.addColorStop(0.3, 'rgba(40, 60, 50, 0.05)');
            groundGrad.addColorStop(0.7, 'rgba(40, 60, 50, 0.1)');
            groundGrad.addColorStop(1, 'rgba(40, 60, 50, 0.15)');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundY, w, h - groundY);

            // Seaweed
            for (let i = 0; i < 6; i++) {
                const x = (i / 6) * w + 20 + Math.sin(i * 0.7) * 15;
                const y = groundY + 5;
                ctx.beginPath();
                ctx.moveTo(x, y);
                for (let j = 0; j < 20; j++) {
                    const t = j / 20;
                    const px = x + Math.sin(t * 3 + time * 0.005 + i * 0.5) * (5 + t * 10);
                    const py = y - t * 60;
                    ctx.lineTo(px, py);
                }
                ctx.strokeStyle = `rgba(40, 80, 40, ${0.1 + Math.sin(i + time * 0.005) * 0.05})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // ===== BLOW BUBBLES =====
        function blowBubbles() {
            const cx = canvas.width / 2 + 30;
            const cy = canvas.height / 2 + 10;
            const numBubbles = 3 + Math.floor(Math.random() * 4);
            const colorFn = colorPalettes[colorMode].bubble;
            
            for (let i = 0; i < numBubbles; i++) {
                const color = colorFn((i / numBubbles + time * 0.01) % 1);
                const bubble = new Bubble(cx, cy, color);
                bubble.radius = 2 + Math.random() * 5;
                bubble.targetRadius = bubble.radius * (1.5 + Math.random() * 2);
                bubble.speed = 0.2 + Math.random() * 0.4;
                bubble.wobble = 0.2 + Math.random() * 0.5;
                bubbles.push(bubble);
            }

            blowCount++;
            statusText.textContent = `🫧 ${numBubbles} bubbles! (${blowCount} blows)`;
            setTimeout(() => {
                statusText.textContent = `🐟 ${bubbles.length} bubbles • ${colorPalettes[colorMode].name}`;
            }, 1000);

            // Spawn particles
            const palette = colorPalettes[colorMode];
            for (let i = 0; i < 10; i++) {
                const p = new Particle(
                    cx + (Math.random() - 0.5) * 20,
                    cy + (Math.random() - 0.5) * 10,
                    palette.bubble(0.5)
                );
                p.vx = (Math.random() - 0.5) * 2;
                p.vy = -Math.random() * 2 - 0.5;
                particles.push(p);
            }
        }

        // ===== RESET =====
        function resetFish() {
            bubbles = [];
            particles = [];
            blowCount = 0;
            speedLevel = 1;
            speed = speeds[1].value;
            colorMode = 0;
            speedBtn.textContent = `Speed: ${speeds[1].name}`;
            colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = `🐟 ${bubbles.length} bubbles • ${colorPalettes[0].name}`;
            }, 1000);
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2 + 10;
            const scale = Math.min(w, h) / 400;
            time += speed;

            // Update bubbles
            for (let i = bubbles.length - 1; i >= 0; i--) {
                const b = bubbles[i];
                b.update(speed);
                if (b.isDead()) {
                    bubbles.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.isDead()) {
                    particles.splice(i, 1);
                }
            }

            // Auto-blow occasionally
            if (Math.random() < 0.003 * speed * 20) {
                blowBubbles();
            }

            // Draw
            drawBackground(ctx, w, h);

            // Draw bubbles
            for (const b of bubbles) {
                b.draw(ctx);
            }

            // Draw particles
            for (const p of particles) {
                p.draw(ctx);
            }

            // Draw fish
            drawFish(ctx, cx, cy, scale);

            // Update status
            if (frameCount % 30 === 0) {
                statusText.textContent = `🐟 ${bubbles.length} bubbles • ${colorPalettes[colorMode].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Blow
        blowBtn.addEventListener('click', blowBubbles);

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = `🐟 ${bubbles.length} bubbles • ${colorPalettes[colorMode].name}`;
            }, 1000);
        });

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorPalettes.length;
            colorBtn.textContent = `Color: ${colorPalettes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorPalettes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = `🐟 ${bubbles.length} bubbles • ${colorPalettes[colorMode].name}`;
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', resetFish);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'b' || e.key === 'B') {
                blowBtn.click();
            }
            if (e.key === 's' || e.key === 'S') {
                speedBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                blowBtn.click();
            }
        });

        // ===== CANVAS CLICK =====
        canvas.addEventListener('click', blowBubbles);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            blowBubbles();
        }, { passive: false });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // ===== INIT =====
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
        statusText.textContent = `🐟 ${bubbles.length} bubbles • ${colorPalettes[0].name}`;
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('🐟 Bubble Blowing Fish loaded!');
        console.log('💡 B - Blow bubbles');
        console.log('💡 S - Change speed');
        console.log('💡 C - Change color');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Blow bubbles');
        console.log('💡 Click fish - Blow bubbles');
    </script>
</body>
</html>
